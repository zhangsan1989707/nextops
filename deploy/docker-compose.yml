services:
  postgres:
    image: postgres:16-alpine
    container_name: nextops-postgres
    environment:
      POSTGRES_DB: nextops
      POSTGRES_USER: nextops
      POSTGRES_PASSWORD: nextops
    ports:
      - "5432:5432"
    volumes:
      - nextops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextops -d nextops"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
    container_name: nextops-api
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://nextops:nextops@postgres:5432/nextops
      SEED_DEMO_DATA: "false"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      args:
        VITE_API_BASE_URL: http://47.109.85.168:4000
    container_name: nextops-web
    ports:
      - "3019:3000"
    depends_on:
      - api

volumes:
  nextops-postgres-data:
