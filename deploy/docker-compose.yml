services:
  postgres:
    image: postgres:16-alpine
    container_name: nextops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextops}
      POSTGRES_USER: ${POSTGRES_USER:-nextops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextops}
    ports:
      - "5432:5432"
    volumes:
      - nextops-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextops} -d ${POSTGRES_DB:-nextops}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: nextops-redis
    ports:
      - "6379:6379"
    volumes:
      - nextops-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    build:
      context: ../apps/api
    container_name: nextops-api
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-nextops}:${POSTGRES_PASSWORD:-nextops}@postgres:5432/${POSTGRES_DB:-nextops}
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ../apps/web
    container_name: nextops-web
    volumes:
      - ../apps/web/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3019:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  nextops-postgres-data:
  nextops-redis-data:
